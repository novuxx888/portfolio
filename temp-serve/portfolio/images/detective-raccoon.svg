<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Detective Raccoon -->
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background glow -->
  <circle cx="100" cy="100" r="90" fill="url(#bgGlow)"/>

  <!-- Body -->
  <ellipse cx="100" cy="140" rx="35" ry="30" fill="#4b5563" opacity="0.8"/>

  <!-- Head -->
  <circle cx="100" cy="90" r="32" fill="#6b7280"/>

  <!-- Ears -->
  <circle cx="73" cy="65" r="12" fill="#6b7280"/>
  <circle cx="73" cy="65" r="8" fill="#9ca3af"/>
  <circle cx="127" cy="65" r="12" fill="#6b7280"/>
  <circle cx="127" cy="65" r="8" fill="#9ca3af"/>

  <!-- Face mask (raccoon markings) -->
  <ellipse cx="85" cy="88" rx="14" ry="10" fill="#374151"/>
  <ellipse cx="115" cy="88" rx="14" ry="10" fill="#374151"/>

  <!-- Eyes -->
  <circle cx="87" cy="88" r="5" fill="white"/>
  <circle cx="113" cy="88" r="5" fill="white"/>
  <circle cx="88" cy="87" r="2.5" fill="#1f2937"/>
  <circle cx="114" cy="87" r="2.5" fill="#1f2937"/>
  <!-- Eye shine -->
  <circle cx="89.5" cy="85.5" r="1" fill="white" opacity="0.8"/>
  <circle cx="115.5" cy="85.5" r="1" fill="white" opacity="0.8"/>

  <!-- Nose -->
  <ellipse cx="100" cy="97" rx="4" ry="3" fill="#1f2937"/>

  <!-- Mouth -->
  <path d="M96 101 Q100 106 104 101" stroke="#374151" stroke-width="1.5" fill="none"/>

  <!-- Detective Hat -->
  <ellipse cx="100" cy="65" rx="38" ry="8" fill="#92400e"/>
  <path d="M70 65 Q72 35 100 32 Q128 35 130 65" fill="#b45309"/>
  <rect x="90" y="32" width="20" height="5" rx="2" fill="#92400e"/>

  <!-- Magnifying glass -->
  <circle cx="145" cy="115" r="16" stroke="#d4d4d8" stroke-width="3" fill="none" opacity="0.7"/>
  <line x1="136" y1="128" x2="122" y2="148" stroke="#d4d4d8" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <!-- Glass glare -->
  <path d="M140 106 Q144 102 150 106" stroke="white" stroke-width="1.5" fill="none" opacity="0.3"/>

  <!-- Tail (behind body) -->
  <path d="M135 140 Q155 130 150 110 Q147 100 155 95" stroke="#6b7280" stroke-width="8" stroke-linecap="round" fill="none"/>
  <path d="M150 110 Q147 100 155 95" stroke="#9ca3af" stroke-width="8" stroke-linecap="round" fill="none"/>
</svg>

