<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" fill="none">
  <!-- PCB Layers Exploded View -->
  <defs>
    <linearGradient id="pcbGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:0.2"/>
    </linearGradient>
    <linearGradient id="pcbGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eab308;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#ca8a04;stop-opacity:0.2"/>
    </linearGradient>
    <linearGradient id="pcbGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:0.2"/>
    </linearGradient>
    <linearGradient id="pcbGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:0.2"/>
    </linearGradient>
  </defs>

  <!-- Layer 1 - Top Copper -->
  <g transform="translate(30, 20)">
    <rect width="240" height="60" rx="4" fill="url(#pcbGrad1)" stroke="#22c55e" stroke-width="1"/>
    <text x="120" y="25" text-anchor="middle" fill="#4ade80" font-size="10" font-family="monospace">Layer 1 — Top Copper</text>
    <!-- Trace lines -->
    <line x1="30" y1="40" x2="100" y2="40" stroke="#4ade80" stroke-width="1" opacity="0.6"/>
    <line x1="120" y1="40" x2="210" y2="40" stroke="#4ade80" stroke-width="1" opacity="0.6"/>
    <circle cx="30" cy="40" r="3" fill="#4ade80" opacity="0.4"/>
    <circle cx="100" cy="40" r="3" fill="#4ade80" opacity="0.4"/>
    <circle cx="210" cy="40" r="3" fill="#4ade80" opacity="0.4"/>
  </g>

  <!-- Layer 2 - Ground Plane -->
  <g transform="translate(30, 110)">
    <rect width="240" height="60" rx="4" fill="url(#pcbGrad2)" stroke="#eab308" stroke-width="1"/>
    <text x="120" y="25" text-anchor="middle" fill="#fbbf24" font-size="10" font-family="monospace">Layer 2 — Ground Plane</text>
    <!-- Fill pattern -->
    <rect x="15" y="35" width="210" height="15" rx="2" fill="#eab308" opacity="0.15"/>
  </g>

  <!-- Layer 3 - Power Plane -->
  <g transform="translate(30, 200)">
    <rect width="240" height="60" rx="4" fill="url(#pcbGrad3)" stroke="#ef4444" stroke-width="1"/>
    <text x="120" y="25" text-anchor="middle" fill="#f87171" font-size="10" font-family="monospace">Layer 3 — Power Plane</text>
    <rect x="15" y="35" width="210" height="15" rx="2" fill="#ef4444" opacity="0.15"/>
  </g>

  <!-- Layer 4 - Bottom Copper -->
  <g transform="translate(30, 290)">
    <rect width="240" height="60" rx="4" fill="url(#pcbGrad4)" stroke="#3b82f6" stroke-width="1"/>
    <text x="120" y="25" text-anchor="middle" fill="#60a5fa" font-size="10" font-family="monospace">Layer 4 — Bottom Copper</text>
    <line x1="40" y1="42" x2="120" y2="42" stroke="#60a5fa" stroke-width="1" opacity="0.6"/>
    <line x1="140" y1="42" x2="200" y2="42" stroke="#60a5fa" stroke-width="1" opacity="0.6"/>
    <circle cx="40" cy="42" r="3" fill="#60a5fa" opacity="0.4"/>
    <circle cx="200" cy="42" r="3" fill="#60a5fa" opacity="0.4"/>
  </g>

  <!-- Vertical connection lines (vias) -->
  <line x1="90" y1="80" x2="90" y2="110" stroke="#a3a3a3" stroke-width="0.5" stroke-dasharray="3 3"/>
  <line x1="200" y1="80" x2="200" y2="110" stroke="#a3a3a3" stroke-width="0.5" stroke-dasharray="3 3"/>
  <line x1="90" y1="170" x2="90" y2="200" stroke="#a3a3a3" stroke-width="0.5" stroke-dasharray="3 3"/>
  <line x1="200" y1="170" x2="200" y2="200" stroke="#a3a3a3" stroke-width="0.5" stroke-dasharray="3 3"/>
  <line x1="90" y1="260" x2="90" y2="290" stroke="#a3a3a3" stroke-width="0.5" stroke-dasharray="3 3"/>
  <line x1="200" y1="260" x2="200" y2="290" stroke="#a3a3a3" stroke-width="0.5" stroke-dasharray="3 3"/>

  <!-- ESP32 label -->
  <text x="150" y="385" text-anchor="middle" fill="#a3a3a3" font-size="9" font-family="monospace" opacity="0.6">ESP32 — Pi Camera Node PCB</text>
</svg>

