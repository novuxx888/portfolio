<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Cloud Infrastructure Topology Diagram -->
  <defs>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Connection lines -->
  <line x1="200" y1="60" x2="100" y2="150" stroke="url(#lineGrad)" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="200" y1="60" x2="300" y2="150" stroke="url(#lineGrad)" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="200" y1="60" x2="200" y2="150" stroke="url(#lineGrad)" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="100" y1="150" x2="80" y2="240" stroke="url(#lineGrad)" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="100" y1="150" x2="140" y2="240" stroke="url(#lineGrad)" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="200" y1="150" x2="200" y2="240" stroke="url(#lineGrad)" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="300" y1="150" x2="270" y2="240" stroke="url(#lineGrad)" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="300" y1="150" x2="330" y2="240" stroke="url(#lineGrad)" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Central orchestrator node -->
  <circle cx="200" cy="55" r="22" fill="url(#nodeGrad)" stroke="#6366f1" stroke-width="1.5"/>
  <text x="200" y="59" text-anchor="middle" fill="#a5b4fc" font-size="10" font-family="monospace">ORCH</text>

  <!-- Worker nodes -->
  <rect x="75" y="130" width="50" height="40" rx="6" fill="url(#nodeGrad)" stroke="#6366f1" stroke-width="1"/>
  <text x="100" y="154" text-anchor="middle" fill="#a5b4fc" font-size="8" font-family="monospace">VM-01</text>

  <rect x="175" y="130" width="50" height="40" rx="6" fill="url(#nodeGrad)" stroke="#6366f1" stroke-width="1"/>
  <text x="200" y="154" text-anchor="middle" fill="#a5b4fc" font-size="8" font-family="monospace">VM-02</text>

  <rect x="275" y="130" width="50" height="40" rx="6" fill="url(#nodeGrad)" stroke="#6366f1" stroke-width="1"/>
  <text x="300" y="154" text-anchor="middle" fill="#a5b4fc" font-size="8" font-family="monospace">VM-03</text>

  <!-- AI Agent icons (small circles) -->
  <circle cx="80" cy="240" r="12" fill="url(#nodeGrad)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="80" y="243" text-anchor="middle" fill="#c4b5fd" font-size="7" font-family="monospace">AI</text>

  <circle cx="140" cy="240" r="12" fill="url(#nodeGrad)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="140" y="243" text-anchor="middle" fill="#c4b5fd" font-size="7" font-family="monospace">AI</text>

  <circle cx="200" cy="240" r="12" fill="url(#nodeGrad)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="200" y="243" text-anchor="middle" fill="#c4b5fd" font-size="7" font-family="monospace">AI</text>

  <circle cx="270" cy="240" r="12" fill="url(#nodeGrad)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="270" y="243" text-anchor="middle" fill="#c4b5fd" font-size="7" font-family="monospace">AI</text>

  <circle cx="330" cy="240" r="12" fill="url(#nodeGrad)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="330" y="243" text-anchor="middle" fill="#c4b5fd" font-size="7" font-family="monospace">AI</text>

  <!-- Labels -->
  <text x="200" y="25" text-anchor="middle" fill="#6366f1" font-size="10" font-family="monospace" opacity="0.7">Cloud Orchestration Layer</text>
  <text x="200" y="285" text-anchor="middle" fill="#8b5cf6" font-size="10" font-family="monospace" opacity="0.7">Autonomous AI Agents</text>
</svg>

